<!DOCTYPE html>
<html lang="en">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Nunito', sans-serif; background-color: #0f172a; text-align: center; padding: 20px; color: #f8fafc; margin: 0;}
        h1 { color: #22d3ee; font-size: 36px; font-weight: 900; margin-bottom: 10px; letter-spacing: 1px; text-shadow: 0 4px 20px rgba(34, 211, 238, 0.4);}
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 25px; max-width: 1200px; margin: 0 auto; padding-bottom: 50px;}
        .card { background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #334155; display: flex; flex-direction: column; align-items: center; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);}
        .card:hover { transform: translateY(-8px); border-color: #22d3ee; box-shadow: 0 15px 40px rgba(34, 211, 238, 0.2); }
        .img-container { width: 180px; height: 180px; background: radial-gradient(circle at center, #1e293b, #020617); border-radius: 16px; margin-bottom: 20px; display: flex; align-items: center; justify-content: center; box-shadow: inset 0 4px 20px rgba(0,0,0,0.8); position: relative;}
        .card h3 { margin: 0 0 15px 0; font-size: 18px; color: #e2e8f0;}
        .instructions { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 25px; border-radius: 16px; max-width: 800px; margin: 0 auto 40px auto; text-align: left; border-left: 6px solid #22d3ee; box-shadow: 0 10px 25px rgba(0,0,0,0.3);}
        button { background: linear-gradient(135deg, #0ea5e9, #2563eb); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 800; cursor: pointer; font-family: inherit; font-size: 15px; width: 100%; transition: all 0.2s; box-shadow: 0 4px 15px rgba(37, 99, 235, 0.4);}
        button:hover { background: linear-gradient(135deg, #22d3ee, #3b82f6); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(34, 211, 238, 0.6); }
        button:active { transform: translateY(1px); }
        svg { width: 100%; height: 100%; filter: drop-shadow(0px 8px 6px rgba(0,0,0,0.5)); }
    </style>
</head>

                <!-- Blazing Fire Glow -->
                <circle cx="50" cy="65" r="30" fill="url(#g-gold)" opacity="0.8"/>
                <circle cx="50" cy="60" r="20" fill="url(#g-red)" opacity="0.9"/>
                <path d="M 45 46 Q 30 65 42 75 L 50 65 L 58 75 Q 70 65 55 46 Z" fill="#fff"/>
            </svg>`,

            chest: `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                <defs>${glowDefs}</defs>
                <ellipse cx="50" cy="85" rx="35" ry="8" fill="rgba(0,0,0,0.5)"/>
                
                <!-- Open Lid Back -->
                <path d="M 20 50 Q 50 10 80 50 L 75 50 Q 50 20 25 50 Z" fill="#78350f" stroke="#0f172a" stroke-width="2"/>
                
                <!-- Blinding Golden Glow -->
                <circle cx="50" cy="45" r="45" fill="url(#g-gold)" opacity="0.9"/>
                <circle cx="50" cy="45" r="25" fill="#fff" opacity="0.6" filter="blur(2px)"/>
                
                <!-- Gold Inside -->
                <path d="M 25 55 Q 50 20 75 55 Z" fill="#fde047"/>
                <circle cx="50" cy="40" r="5" fill="#ef4444" stroke="#7f1d1d" stroke-width="1"/>
                
                <!-- Base -->
                <path d="M 15 55 L 85 55 L 80 85 L 20 85 Z" fill="#b45309" stroke="#0f172a" stroke-width="4" stroke-linejoin="round"/>
                
                <!-- Metal Bands -->
                <path d="M 30 55 L 30 85 M 70 55 L 70 85" stroke="#94a3b8" stroke-width="6"/>
                <path d="M 15 55 L 85 55" stroke="#94a3b8" stroke-width="6" stroke-linecap="round"/>
                
                <!-- Giant Shiny Lock & Glow -->
                <circle cx="50" cy="54" r="15" fill="url(#g-cyan)" opacity="0.8"/>
                <rect x="42" y="48" width="16" height="20" rx="3" fill="#fff" stroke="#0f172a" stroke-width="3"/>
                <circle cx="50" cy="54" r="3" fill="#0f172a"/>
                <path d="M 49 54 L 49 62 L 51 62 L 51 54 Z" fill="#0f172a"/>
            </svg>`
        };

        const gallery = document.getElementById("gallery");

        Object.keys(svgTemplates).forEach(id => {
            gallery.innerHTML += `
                <div class="card">
                    <div class="img-container" id="container-${id}">
                        ${svgTemplates[id]}
                    </div>
                    <h3>${id}.png</h3>
                    <button onclick="downloadPNG('${id}')">Download Glowing PNG 💾</button>
                </div>
            `;
        });

        // HTML5 Canvas engine: Safely extracts <defs>, renders gradients/shadows, exports to transparent PNG
        function downloadPNG(id) {
            const container = document.getElementById(`container-${id}`);
            const svgElement = container.querySelector('svg');
            
            const svgString = new XMLSerializer().serializeToString(svgElement);
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');
            
            const img = new Image();
            const base64SVG = btoa(unescape(encodeURIComponent(svgString)));
            const url = `data:image/svg+xml;base64,${base64SVG}`;
            
            img.onload = function() {
                ctx.drawImage(img, 0, 0, 512, 512);
                const pngUrl = canvas.toDataURL('image/png');
                const a = document.createElement('a');
                a.href = pngUrl;
                a.download = `${id}.png`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            };
            img.src = url;
        }
    </script>
